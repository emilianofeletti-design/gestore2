<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workstation Pratiche EF</title>
    <style>
        /* Reset e Layout */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            background: #f0f2f5;
        }
        
        /* Barra di Navigazione Superiore Ultrasottile */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2c3e50;
            height: 40px; /* Ridotta ulteriormente per il massimo spazio */
            gap: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 9999;
            position: relative;
        }

        .nav-btn {
            height: 100%;
            background: none;
            border: none;
            color: #95a5a6;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            padding: 0 20px;
            display: flex;
            align-items: center;
            outline: none;
        }

        .nav-btn:hover {
            color: #ffffff;
        }

        /* Indicatore attivo con linea luminosa */
        .nav-btn.active {
            color: #ffffff;
        }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #3498db;
            box-shadow: 0 0 8px #3498db;
        }

        /* Contenitore Frame: entrambi occupano tutto lo spazio disponibile */
        .frame-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 40px);
        }

        .content-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            /* Invece di display:none usiamo opacity e pointer-events 
               per mantenere i processi attivi in background senza crash */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease-in-out;
        }

        /* Classe per mostrare il frame attivo */
        .content-frame.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <button class="nav-btn active" id="btnMsg" onclick="switchTab('msg')">
        📩 Gestione Messaggi
    </button>
    <button class="nav-btn" id="btnCalc" onclick="switchTab('calc')">
        🧮 Calcolatore Stralcio
    </button>
</nav>

<div class="frame-container">
    <iframe src="messaggi.html" class="content-frame active" id="frameMsg"></iframe>
    <iframe src="calcolatore.html" class="content-frame" id="frameCalc"></iframe>
</div>

<script>
    function switchTab(tab) {
        const frameMsg = document.getElementById('frameMsg');
        const frameCalc = document.getElementById('frameCalc');
        const btnMsg = document.getElementById('btnMsg');
        const btnCalc = document.getElementById('btnCalc');

        if (tab === 'msg') {
            // Mostra Messaggi, Nascondi Calcolatore
            frameMsg.classList.add('active');
            frameCalc.classList.remove('active');
            
            btnMsg.classList.add('active');
            btnCalc.classList.remove('active');
        } else {
            // Mostra Calcolatore, Nascondi Messaggi
            frameCalc.classList.add('active');
            frameMsg.classList.remove('active');
            
            btnCalc.classList.add('active');
            btnMsg.classList.remove('active');
        }
    }

    // Gestione preventiva: se un frame non risponde, ricarica solo quello
    window.onerror = function() {
        console.log("Rilevato potenziale rallentamento nel caricamento dei moduli.");
    };
</script>

</body>
</html>
